backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "public/blog/images"
public_folder: "/blog/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{fields.url_slug}}"
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "URL Slug", name: "url_slug", widget: "string", hint: "The URL path for this post, e.g. microdosing-protocols-compared. Use lowercase letters, numbers, and hyphens only." }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Preparation"
          - "Safety"
          - "Microdosing"
          - "Integration"
          - "Science"
          - "Navigation"
          - "Community"
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Author", name: "author", widget: "string", default: "HTUP" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
