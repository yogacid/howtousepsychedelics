<!DOCTYPE html>
<html lang="en">
<head>

  <title>How to Use Psychedelics</title>
  <script>
    // GitHub Pages SPA trick: store the requested path in sessionStorage,
    // then redirect to the root so index.html can restore the correct page.
    sessionStorage.setItem('spa-redirect', window.location.pathname);
    window.location.replace('/');
  </script>
</head>
