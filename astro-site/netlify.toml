[build]
  command = "npm run build"
  publish = "dist"

# www → non-www canonical redirect
[[redirects]]
  from = "https://www.howtousepsychedelics.com/*"
  to = "https://howtousepsychedelics.com/:splat"
  status = 301
  force = true

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404/index.html"
  status = 404
